<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" th:href="@{/css/create.css}">
    <link rel="stylesheet" th:href="@{/css/style.css}">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Create Room</title>
</head>

<body>

<div class="room">

    <div class="room-container">

        <div class="room-card">

            <h1 class="room-title">Create Room</h1>

            <p class="room-subtitle">
                Start an aux battle and invite your friends.
            </p>

            <form
                th:action="@{/save/create}"
                th:object="${room}"
                method="post"
                id="create"
                class="room-form">

                <div id="error-box" class="error-box"></div>

                <input
                    th:field="*{roomName}"
                    class="room-input"
                    type="text"
                    id="roomNameCreate"
                    placeholder="Room name"
                    required>

                <input
                    th:field="*{maxUser}"
                    class="room-input"
                    type="number"
                    id="maxCreate"
                    min="2"
                    placeholder="Max players"
                    required>

                <div class="room-visibility">
                    <span class="visibility-label">Room Type</span>

                    <label class="switch">
                        <input
                            th:field="*{privateRoom}"
                            type="checkbox"
                            id="privateToggle">
                        <span class="slider"></span>
                    </label>

                    <span id="roomTypeText" class="visibility-text">
                        Public
                    </span>
                </div>

                <p class="room-text">
                    Have a room code?
                    <a href="/join-battle" class="room-link">
                        Join room
                    </a>
                </p>

                <button type="submit" class="room-button">
                    Create Room
                </button>

            </form>

        </div>

    </div>

</div>

</body>
</html>
